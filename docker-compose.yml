version: "3.9"

services:
  monitor:
    build: .
    container_name: network-monitor
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN       # required: ARP scanning, interface control
      - NET_RAW         # required: nmap raw packet crafting for -O
    security_opt:
      - no-new-privileges:true  # prevents any process from gaining more privileges
                                # than it starts with — the key escalation defence
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: >
        ["CMD", "python3", "-c",
         "import os,time; hb='/app/data/heartbeat';
          assert os.path.exists(hb) and (time.time()-os.path.getmtime(hb)) < 180,
          'Scan loop stalled'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
